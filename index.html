<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Waystation Mural Pixel Painter</title>

  <style>
    :root { color-scheme: light dark; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 24px;
      display: grid;
      gap: 16px;
      justify-items: start;
    }

    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    .paletteWrap { display: grid; gap: 6px; }
    .palette { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .swatch {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 2px solid rgba(0,0,0,0.25);
      cursor: pointer;
      position: relative;
    }

    /* Visual indicator for the currently selected color */
    .swatch[aria-pressed="true"]::after {
      content: "";
      position: absolute;
      inset: -4px;
      border: 2px solid currentColor;
      border-radius: 12px;
    }

    button {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.25);
      background: transparent;
      cursor: pointer;
    }

    /* Canvas has a visible border and rounded corners. */
    canvas {
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.25);
      touch-action: none; /* helps pointer events on mobile */
      background: #fff;   /* just in case; we also paint a white background in JS */
      display: block;
    }

    .hint {
      opacity: 0.75;
      font-size: 14px;
      line-height: 1.35;
      max-width: 80ch;
    }

#paletteHint {
  display: none;
}

    code {
      padding: 0 6px;
      border-radius: 6px;
      background: rgba(0,0,0,0.06);
    }
  </style>
</head>

<body>
  <h1 style="margin:0;">Waystation Mural Pixel Painter</h1>

  <div class="row">
    <div class="paletteWrap">
      <div class="palette" id="palette" aria-label="Color palette"></div>
      <div class="hint" id="paletteHint"></div>
    </div>

    <button id="clearBtn" type="button">Clear</button>
    <button id="exportBtn" type="button">Export PNG</button>
  </div>

  <!-- NOTE:
       We will set the canvas size in JS so it is "big" internally (not CSS-scaled).
       That makes gridlines easy and prevents the gray/muted issue you saw. -->
  <canvas id="c" aria-label="Pixel grid"></canvas>

  <div class="hint">
    Tip: click/tap to paint. Click-drag (or touch-drag) to paint continuously.
    Export creates a clean PNG (no grid), scaled up so it’s readable.
  </div>

  <script>
    /**********************************************************************
     * 0) What this tool does (high-level)
     * --------------------------------------------------------------------
     * - The mural is 22×14 "cells" (308 total).
     * - We store the mural as an array of 308 numbers.
     *   Each number is 0..7 (index into the LIVE palette of 8 colors).
     *
     * - We draw the mural to a canvas that is internally large:
     *     (22 * CELL_SIZE) × (14 * CELL_SIZE)
     *   So each mural cell is a big square on screen.
     *
     * - We draw faint gridlines ON TOP for editing.
     * - Export draws onto a separate canvas WITHOUT gridlines.
     **********************************************************************/

    // --- MURAL SIZE (fixed) ---
    const GRID_W = 22;
    const GRID_H = 14;

    // --- EDITOR CELL SIZE (how big each pixel looks on screen) ---
    // Increase for a larger editor; decrease for smaller.
    const CELL_SIZE = 24;

    /**********************************************************************
     * 1) Colors: 30 total available, 8 live per week
     * --------------------------------------------------------------------
     * - Add/edit colors in ALL_COLORS (30+ options).
     * - Choose which 8 are live this week using LIVE_COLOR_IDS.
     *
     * Weekly swap process:
     *   1) Edit LIVE_COLOR_IDS to a different set of 8 IDs
     *   2) Commit
     *   3) Done
     **********************************************************************/

    const ALL_COLORS = [
      { id: "alien green", hex: "#13ff80" },
      { id: "apricot", hex: "#ffc582" },
      { id: "aquamarine", hex: "#00eabf" },
      { id: "baby blue", hex: "#a8f9f9" },
      { id: "buttermilk", hex: "#ebffff" },
      { id: "camel", hex: "#df9d69" },
      { id: "chestnut", hex: "#90513e" },
      { id: "cornflower blue", hex: "#559af9" },
      { id: "dove grey", hex: "#dbeefd" },
      { id: "dusty rose", hex: "#e96fa2" },
      { id: "honey mustard", hex: "#fee594" },
      { id: "indigo", hex: "#3f3862" },
      { id: "intestines pink", hex: "#ff989f" },
      { id: "mulberry", hex: "#8c4371" },
      { id: "murky water", hex: "#3f617c" },
      { id: "obsidian", hex: "#32292f" },
      { id: "parmesan", hex: "#ffffd1" },
      { id: "peach cream", hex: "#ffc5b7" },
      { id: "pebble grey", hex: "#a2aac0" },
      { id: "purple plum", hex: "#70406f" },
      { id: "raspberry", hex: "#cf335a" },
      { id: "salted caramel", hex: "#b67150" },
      { id: "shark grey", hex: "#787ca2" },
      { id: "sky blue", hex: "#5ae8fe" },
      { id: "slate", hex: "#5b5a71" },
      { id: "steel blue", hex: "#4c64ae" },
      { id: "teal", hex: "#259ebd" },
      { id: "thangerine", hex: "#ff8e3f" },
      { id: "thistle", hex: "#bd4ca4" },
      { id: "vermillion", hex: "#ff3e3a" },
    ];

    // 👇 Change these 8 IDs weekly.
    // They must exist in ALL_COLORS above.
    const LIVE_COLOR_IDS = [
      "vermillion",
      "parmesan",
      "steel blue",
      "purple plum",
      "obsidian",
      "apricot",
      "aquamarine",
      "dusty rose",
    ];

    // Turn ALL_COLORS into a map (id -> hex) for easy lookup
    const allById = new Map(ALL_COLORS.map(c => [c.id, c.hex]));

    // Build the live palette (exactly 8 colors, in your chosen order)
    const LIVE_COLORS = LIVE_COLOR_IDS.map(id => {
      const hex = allById.get(id);
      if (!hex) {
        // If you typo a color ID, we warn and use a loud fallback
        console.warn(`LIVE_COLOR_IDS includes "${id}" but it isn't in ALL_COLORS.`);
        return { id, hex: "#ff00ff" };
      }
      return { id, hex };
    });

    /**********************************************************************
     * 2) State: mural data + selected color
     **********************************************************************/

    // selected is 0..7 (index into LIVE_COLORS)
    let selected = 0;

    // pixels is 308 entries (22*14), each 0..7
    const pixels = new Uint8Array(GRID_W * GRID_H);

    // Background is always white, independent of the palette.
    // -1 means "blank / white cell".
    const EMPTY = -1;
    pixels.fill(EMPTY);

    /**********************************************************************
     * 3) DOM / Canvas setup (including crisp rendering on high-DPI screens)
     **********************************************************************/

    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d", { alpha: false });

    const paletteEl = document.getElementById("palette");
    const paletteHint = document.getElementById("paletteHint");
    const clearBtn = document.getElementById("clearBtn");
    const exportBtn = document.getElementById("exportBtn");

    // We want the canvas to be exactly GRID_W * CELL_SIZE wide in "CSS pixels".
    const cssWidth = GRID_W * CELL_SIZE;
    const cssHeight = GRID_H * CELL_SIZE;

    // Device Pixel Ratio (retina screens, etc.). This makes the canvas sharp.
    const dpr = window.devicePixelRatio || 1;

    // Set canvas internal resolution (real pixels)
    canvas.width = Math.floor(cssWidth * dpr);
    canvas.height = Math.floor(cssHeight * dpr);

    // Set canvas display size (CSS pixels)
    canvas.style.width = cssWidth + "px";
    canvas.style.height = cssHeight + "px";

    // Tell the context: "treat my drawing units as CSS pixels"
    // Now when we draw a 24×24 square, it looks correct on all screens.
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    /**********************************************************************
     * 4) Palette UI
     **********************************************************************/

    function renderPalette() {
      paletteEl.innerHTML = "";

      LIVE_COLORS.forEach((c, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "swatch";
        b.style.background = c.hex;
        b.style.color = c.hex; // used for selection ring
        b.setAttribute("aria-pressed", String(i === selected));
        b.title = c.id;

        b.addEventListener("click", () => {
          selected = i;
          [...paletteEl.children].forEach((child, idx) => {
            child.setAttribute("aria-pressed", String(idx === selected));
          });
        });

        paletteEl.appendChild(b);
      });

      paletteHint.innerHTML = `
        <strong>Palette notes:</strong>
        Your 8 live swatches are controlled by <code>LIVE_COLOR_IDS</code>.
        You currently have <code>${ALL_COLORS.length}</code> total available colors in <code>ALL_COLORS</code>.
        To rotate weekly, replace the 8 IDs in <code>LIVE_COLOR_IDS</code> with any 8 IDs from <code>ALL_COLORS</code>.
      `;
    }

    /**********************************************************************
     * 5) Drawing (editor view)
     **********************************************************************/

    // Draw the mural pixels (no grid)
    function drawPixelsOnly() {
      // Fill background (this ensures "white" is actually painted, not transparent)
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, cssWidth, cssHeight);

      // Draw each cell as a big square
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          const idx = y * GRID_W + x;
          const colorHex =   
            pixels[idx] === EMPTY
            ? "#ffffff"
            : LIVE_COLORS[pixels[idx]].hex;

          ctx.fillStyle = colorHex;
          ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }
      }
    }

    // Draw faint grid lines over the mural (editor-only)
    function drawGridLines() {
      ctx.save();
      ctx.strokeStyle = "rgba(0,0,0,0.12)"; // faint on white
      ctx.lineWidth = 1;

      ctx.beginPath();

      // Vertical grid lines
      for (let x = 0; x <= GRID_W; x++) {
        const px = x * CELL_SIZE + 0.5; // +0.5 makes 1px lines crisp
        ctx.moveTo(px, 0);
        ctx.lineTo(px, cssHeight);
      }

      // Horizontal grid lines
      for (let y = 0; y <= GRID_H; y++) {
        const py = y * CELL_SIZE + 0.5;
        ctx.moveTo(0, py);
        ctx.lineTo(cssWidth, py);
      }

      ctx.stroke();
      ctx.restore();
    }

    // Full redraw (pixels + grid overlay)
    function drawAll() {
      drawPixelsOnly();
      drawGridLines();
    }

    /**********************************************************************
     * 6) Input (paint on click-drag)
     **********************************************************************/

    // Convert pointer location -> which grid cell?
    function pointerToCell(evt) {
      const rect = canvas.getBoundingClientRect();
      const cx = evt.clientX - rect.left;
      const cy = evt.clientY - rect.top;

      const x = Math.floor(cx / CELL_SIZE);
      const y = Math.floor(cy / CELL_SIZE);
      return { x, y };
    }

    function setPixel(x, y, colorIndex) {
      if (x < 0 || x >= GRID_W || y < 0 || y >= GRID_H) return;
      pixels[y * GRID_W + x] = colorIndex;
    }

    let painting = false;

    canvas.addEventListener("pointerdown", (evt) => {
      painting = true;
      canvas.setPointerCapture(evt.pointerId);

      const { x, y } = pointerToCell(evt);
      setPixel(x, y, selected);
      drawAll();
    });

    canvas.addEventListener("pointermove", (evt) => {
      if (!painting) return;

      const { x, y } = pointerToCell(evt);
      setPixel(x, y, selected);
      drawAll();
    });

    canvas.addEventListener("pointerup", () => { painting = false; });
    canvas.addEventListener("pointercancel", () => { painting = false; });
    canvas.addEventListener("pointerleave", () => { painting = false; });

    /**********************************************************************
     * 7) Buttons
     **********************************************************************/

    // Clear = reset to white background
    clearBtn.addEventListener("click", () => {
      pixels.fill(EMPTY);
      drawAll();
    });

    // Export PNG:
    // - We draw the mural to an offscreen canvas.
    // - We do NOT draw the grid.
    // - We scale up so it’s readable.
    exportBtn.addEventListener("click", () => {
      const exportScale = 20; // size of each cell in the exported PNG

      const outW = GRID_W * exportScale;
      const outH = GRID_H * exportScale;

      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = outW;
      exportCanvas.height = outH;

      const exportCtx = exportCanvas.getContext("2d");

      // Background
      exportCtx.fillStyle = "#ffffff";
      exportCtx.fillRect(0, 0, outW, outH);

      // Pixels (no grid)
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          const idx = y * GRID_W + x;
          exportCtx.fillStyle =
            pixels[idx] === EMPTY
              ? "#ffffff"
              : LIVE_COLORS[pixels[idx]].hex;
          exportCtx.fillRect(x * exportScale, y * exportScale, exportScale, exportScale);
        }
      }

      // Trigger download
      const link = document.createElement("a");
      link.download = "pixel-art.png";
      link.href = exportCanvas.toDataURL("image/png");
      link.click();
    });

    /**********************************************************************
     * 8) Init
     **********************************************************************/
    renderPalette();
    drawAll();
  </script>
</body>
</html>
